<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PageGobbler Promo Tile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px; height: 280px; overflow: hidden;
      background: linear-gradient(135deg, #1a1008 0%, #120c06 40%, #241a0e 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      text-align: center;
    }
    .icon { margin-bottom: 16px; }
    h1 {
      font-size: 36px; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(135deg, #E8A849 0%, #D4762C 50%, #C0392B 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .tagline {
      font-size: 14px; color: #9C8A74; line-height: 1.5; max-width: 320px; margin: 0 auto 18px;
    }
    .features {
      display: flex; gap: 16px; justify-content: center;
    }
    .feature {
      background: rgba(212,118,44,0.1); border: 1px solid rgba(212,118,44,0.2);
      border-radius: 8px; padding: 6px 12px; font-size: 11px; color: #E8A849;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="56" height="56" viewBox="0 0 32 32" fill="none">
        <path d="M16 4 Q10 1 7 6 Q10 6 12 10" fill="#C0392B"/>
        <path d="M16 4 Q22 1 25 6 Q22 6 20 10" fill="#C0392B"/>
        <path d="M16 3 Q8 2 6 8 Q10 7 13 10" fill="#D4762C"/>
        <path d="M16 3 Q24 2 26 8 Q22 7 19 10" fill="#D4762C"/>
        <path d="M16 2 Q12 3 10 8 Q13 7 15 10" fill="#E8A849"/>
        <path d="M16 2 Q20 3 22 8 Q19 7 17 10" fill="#E8A849"/>
        <ellipse cx="16" cy="18" rx="7" ry="8" fill="#8B4513"/>
        <ellipse cx="16" cy="17" rx="5.5" ry="6" fill="#A0522D"/>
        <circle cx="16" cy="11" r="3.5" fill="#D2691E"/>
        <path d="M15 12.5 L16 14 L17 12.5" fill="#E8A849" stroke="#D4762C" stroke-width="0.3"/>
        <path d="M16 14 Q16.5 15.5 16 16.5" stroke="#C0392B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <circle cx="14.5" cy="10.5" r="0.8" fill="#1a1008"/>
        <circle cx="17.5" cy="10.5" r="0.8" fill="#1a1008"/>
        <circle cx="14.8" cy="10.3" r="0.25" fill="#fff"/>
        <circle cx="17.8" cy="10.3" r="0.25" fill="#fff"/>
        <path d="M13 25 L12 28 M13 25 L13 28.5 M13 25 L14 28" stroke="#D4762C" stroke-width="1" stroke-linecap="round"/>
        <path d="M19 25 L18 28 M19 25 L19 28.5 M19 25 L20 28" stroke="#D4762C" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>PageGobbler</h1>
    <p class="tagline">Full-page screenshots with smart compression, text extraction, and complete page reverse-engineering.</p>
    <div class="features">
      <span class="feature">Screenshots</span>
      <span class="feature">Text & Metadata</span>
      <span class="feature">ZIP Export</span>
    </div>
  </div>
</body>
</html>
