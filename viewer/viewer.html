<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageGobbler — Results</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div class="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <!-- Tail feathers fan -->
          <path d="M16 4 Q10 1 7 6 Q10 6 12 10" fill="#C0392B"/>
          <path d="M16 4 Q22 1 25 6 Q22 6 20 10" fill="#C0392B"/>
          <path d="M16 3 Q8 2 6 8 Q10 7 13 10" fill="#D4762C"/>
          <path d="M16 3 Q24 2 26 8 Q22 7 19 10" fill="#D4762C"/>
          <path d="M16 2 Q12 3 10 8 Q13 7 15 10" fill="#E8A849"/>
          <path d="M16 2 Q20 3 22 8 Q19 7 17 10" fill="#E8A849"/>
          <!-- Body -->
          <ellipse cx="16" cy="18" rx="7" ry="8" fill="#8B4513"/>
          <ellipse cx="16" cy="17" rx="5.5" ry="6" fill="#A0522D"/>
          <!-- Head -->
          <circle cx="16" cy="11" r="3.5" fill="#D2691E"/>
          <!-- Beak -->
          <path d="M15 12.5 L16 14 L17 12.5" fill="#E8A849" stroke="#D4762C" stroke-width="0.3"/>
          <!-- Snood -->
          <path d="M16 14 Q16.5 15.5 16 16.5" stroke="#C0392B" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          <!-- Eyes -->
          <circle cx="14.5" cy="10.5" r="0.8" fill="#1a1008"/>
          <circle cx="17.5" cy="10.5" r="0.8" fill="#1a1008"/>
          <circle cx="14.8" cy="10.3" r="0.25" fill="#fff"/>
          <circle cx="17.8" cy="10.3" r="0.25" fill="#fff"/>
          <!-- Feet -->
          <path d="M13 25 L12 28 M13 25 L13 28.5 M13 25 L14 28" stroke="#D4762C" stroke-width="1" stroke-linecap="round"/>
          <path d="M19 25 L18 28 M19 25 L19 28.5 M19 25 L20 28" stroke="#D4762C" stroke-width="1" stroke-linecap="round"/>
        </svg>
        <h1>PageGobbler</h1>
      </div>
      <div class="topbar-actions">
        <button id="btn-download-all" class="btn btn-primary" disabled>Download ZIP</button>
        <button id="btn-copy-brief" class="btn btn-secondary" disabled>Copy AI Brief</button>
        <button id="btn-download-brief" class="btn btn-secondary" disabled>Download Brief</button>
        <button id="btn-copy-text" class="btn btn-secondary" disabled>Copy Text</button>
        <button id="btn-copy-metadata" class="btn btn-secondary" disabled>Copy JSON</button>
      </div>
    </header>

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">
      <div class="status-text" id="status-text">Processing your gobble...</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <section class="summary-strip" id="summary-strip" aria-label="Capture summary">
      <div class="summary-card">
        <span class="summary-label">Source</span>
        <strong id="summary-source">Waiting...</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">Sections</span>
        <strong id="summary-sections">—</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">Total Size</span>
        <strong id="summary-size">—</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">AI Pack</span>
        <strong id="summary-ai">Building...</strong>
      </div>
    </section>

    <!-- Main Content -->
    <div class="main">
      <!-- Left: Image sections -->
      <div class="panel panel-images" id="panel-images">
        <h2>Captured Sections</h2>
        <div class="sections-grid" id="sections-grid">
          <!-- Filled dynamically -->
        </div>
      </div>

      <!-- Right: Metadata + Text -->
      <div class="panel panel-data">
        <div class="tabs">
          <button class="tab active" data-tab="metadata">Page Info</button>
          <button class="tab" data-tab="brief">AI Brief</button>
          <button class="tab" data-tab="ocr">Page Text</button>
          <button class="tab" data-tab="json">Raw JSON</button>
        </div>

        <div class="tab-content active" id="tab-metadata">
          <div class="meta-grid" id="meta-grid">
            <!-- Filled dynamically -->
          </div>
        </div>

        <div class="tab-content" id="tab-brief">
          <pre id="ai-brief" class="ai-brief">Building AI brief...</pre>
        </div>

        <div class="tab-content" id="tab-ocr">
          <pre id="ocr-text" class="ocr-text">Extracting page text...</pre>
        </div>

        <div class="tab-content" id="tab-json">
          <pre id="json-output" class="json-output"></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/image-processor.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
